{% extends "base.html" %}
{% block content %}
<div class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight">Integrated Calendar</h1>
            <p class="text-sm text-slate-400 mt-1">Unified view of hard commitments and task targets.</p>
        </div>
        <a href="{{ url_for('manage_tasks') }}" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-sm font-medium px-4 py-2.5 rounded-xl">
            ← Back to Directory
        </a>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 md:p-6 shadow-xl text-white">
        <div id="calendar-root"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar-root');
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: window.innerWidth < 768 ? 'listWeek' : 'dayGridMonth',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: window.innerWidth < 768 ? 'listWeek,timeGridDay' : 'dayGridMonth,timeGridWeek,listWeek'
        },
        events: '/api/calendar-events',
        height: 'auto',
        themeSystem: 'standard',
        eventTimeFormat: {
            hour: '2-digit',
            minute: '2-digit',
            meridiem: false,
            hour12: false
        }
    });
    calendar.render();
});
</script>

<style>
    /* Clean overrides to make FullCalendar match your dark slate theme dashboard */
    .fc { --fc-border-color: #1e293b; --fc-page-bg-color: #020617; }
    .fc .fc-toolbar-title { font-size: 1.25rem; font-weight: 700; color: #ffffff; }
    .fc .fc-button-primary { background-color: #1e293b; border-color: #334155; color: #e2e8f0; border-radius: 0.75rem; font-weight: 500; }
    .fc .fc-button-primary:hover { background-color: #334155; }
    .fc .fc-button-active { background-color: #7c3aed !important; border-color: #6d28d9 !important; }
    .fc-theme-standard th { background-color: #0f172a; padding: 0.5rem 0; font-size: 0.875rem; font-weight: 600; color: #94a3b8; }
    .fc .fc-list-event:hover td { background-color: #1e293b !important; }
    .fc .fc-list-day-cushion { background-color: #0f172a !important; }
</style>
{% endblock %}
