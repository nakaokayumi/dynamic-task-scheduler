{% extends 'base.html' %}
{% block content %}
<div class="space-y-6 max-w-3xl mx-auto">
    <header>
        <h1 class="text-3xl font-extrabold text-white tracking-tight">⚡ Your Daily Energy Levels</h1>
        <p class="text-slate-400 text-sm mt-1">Rate your focus and energy (1-5) throughout the day so the algorithm can schedule tasks when your focus is highest</p>
    </header>

    <form method="POST" class="bg-slate-950 border border-slate-800 rounded-2xl p-6 shadow-xl space-y-6">
        <div class="divide-y divide-slate-800/60 max-h-[60vh] overflow-y-auto pr-2">
            {% for row in energy_levels %}
            <div class="flex justify-between items-center py-3">
                <span class="font-mono text-slate-300 text-sm">{{ '%02d' % row.hour }}:00 Timeline Target Window</span>
                <div class="flex items-center space-x-2">
                    <label class="text-xs text-slate-500 mr-2">Your Energy Level:</label>
                    <input type="number" name="energy_{{ row.hour }}" min="1" max="5" value="{{ row.energy_level }}" required 
                           class="w-16 bg-slate-900 border border-slate-800 rounded-lg p-1.5 text-center text-purple-400 font-bold focus:outline-none focus:border-purple-500">
                </div>
            </div>
            {% endfor %}
        </div>
        <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-semibold py-2.5 rounded-xl transition cursor-pointer shadow-lg shadow-purple-950/40">
            Save Energy Levels
        </button>
    </form>
</div>
{% endblock %}
