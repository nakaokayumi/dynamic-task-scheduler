{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto my-6">
    <div class="bg-slate-950 border border-slate-800 rounded-2xl p-8 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-sky-500 via-purple-500 to-emerald-500"></div>
        
        <header class="text-center mb-8">
            <h1 class="text-2xl font-black text-white tracking-tight">Initialize Profile Matrix</h1>
            <p class="text-slate-400 text-xs mt-1">Configure your personal parameters to activate calendar parsing.</p>
        </header>

        <form method="POST" class="space-y-5 text-sm">
            <div>
                <label class="block text-slate-400 font-medium mb-1.5">Full Name / Alias</label>
                <input type="text" name="name" value="{{ profile.name if profile else '' }}" required placeholder="e.g. Alex"
                       class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-sky-500 transition">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-slate-400 font-medium mb-1.5">Age</label>
                    <input type="number" name="age" value="{{ profile.age if profile else '' }}" required placeholder="e.g. 21"
                           class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-sky-500 transition">
                </div>
                <div>
                    <label class="block text-slate-400 font-medium mb-1.5">Daily Wake Time</label>
                    <input type="time" name="wake_time" value="{{ profile.wake_time if profile else '06:00' }}" required
                           class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-emerald-400 font-mono font-bold focus:outline-none focus:border-sky-500 transition">
                </div>
            </div>

            <div>
                <label class="block text-slate-400 font-medium mb-1.5">Primary Occupation</label>
                <input type="text" name="occupation" value="{{ profile.occupation if profile else '' }}" required placeholder="e.g. Engineer"
                       class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-sky-500 transition">
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-sky-600 to-purple-600 hover:from-sky-500 hover:to-purple-500 text-white font-bold py-3 rounded-xl mt-4 transition transform active:scale-98 shadow-lg shadow-sky-950/40 cursor-pointer">
                Lock Configurations & Enter Matrix
            </button>
        </form>
    </div>
</div>
{% endblock %}
